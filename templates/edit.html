<!DOCTYPE html>
<html>
<head>

    <title>Edit Contact</title>

    <link rel="stylesheet" href="/static/style.css">

</head>
<body>

<div class="container">

    <h1>✏ Edit Contact</h1>

    <form method="POST">

        <input type="text"
        name="name"
        value="{{ contact[1] }}"
        required>

        <input type="text"
        name="phone"
        value="{{ contact[2] }}"
        required>

        <input type="email"
        name="email"
        value="{{ contact[3] }}">

        <input type="text"
        name="company"
        value="{{ contact[4] }}">

        <input type="text"
        name="address"
        value="{{ contact[5] }}">

        <input type="text"
        name="category"
        value="{{ contact[6] }}">

        <button type="submit">
            Update Contact
        </button>

    </form>

</div>

</body>
</html>
